<svg width="1280" height="220" viewBox="0 0 1280 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cleanfy — native macOS cleaner and memory monitor. Swift, SwiftUI.">
  <title>Cleanfy</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A0B12"/>
      <stop offset="1" stop-color="#0D1020"/>
    </linearGradient>
    <radialGradient id="teal" cx="0" cy="0" r="1" gradientTransform="translate(120 30) scale(300)">
      <stop stop-color="#16E0C0" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#16E0C0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="violet" cx="0" cy="0" r="1" gradientTransform="translate(1190 200) scale(360)">
      <stop stop-color="#7B5CFF" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#7B5CFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="spark" x1="-36" y1="-36" x2="36" y2="36" gradientUnits="userSpaceOnUse">
      <stop stop-color="#19E5C2"/>
      <stop offset="1" stop-color="#7B5CFF"/>
    </linearGradient>
    <linearGradient id="name" x1="184" y1="54" x2="184" y2="92" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#B9C0CE"/>
    </linearGradient>
    <filter id="soft" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="42"/>
    </filter>
    <clipPath id="panel">
      <rect x="2" y="2" width="1276" height="216" rx="16"/>
    </clipPath>
  </defs>

  <rect x="2" y="2" width="1276" height="216" rx="16" fill="url(#bg)"/>
  <g clip-path="url(#panel)">
    <g filter="url(#soft)">
      <rect width="1280" height="220" fill="url(#teal)"/>
      <rect width="1280" height="220" fill="url(#violet)"/>
    </g>
  </g>
  <rect x="2.5" y="2.5" width="1275" height="215" rx="16" fill="none" stroke="#FFFFFF" stroke-opacity="0.08"/>

  <!-- sparkle mark -->
  <g transform="translate(104 110) scale(0.5)">
    <path d="M0 -70 C 10 -22, 22 -10, 70 0 C 22 10, 10 22, 0 70 C -10 22, -22 10, -70 0 C -22 -10, -10 -22, 0 -70 Z" fill="url(#spark)"/>
    <path d="M64 -78 C 68 -60, 74 -54, 92 -50 C 74 -46, 68 -40, 64 -22 C 60 -40, 54 -46, 36 -50 C 54 -54, 60 -60, 64 -78 Z" fill="#FFFFFF" fill-opacity="0.92"/>
  </g>

  <!-- name -->
  <text x="184" y="90" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="700" letter-spacing="-1" fill="url(#name)">Cleanfy</text>

  <!-- description -->
  <text x="186" y="132" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="400" fill="#9AA0AB">Native macOS cleaner &amp; memory monitor</text>

  <!-- stack -->
  <text x="186" y="168" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', 'Cascadia Code', 'Segoe UI Mono', Consolas, monospace" font-size="16" font-weight="500" letter-spacing="3" fill="#16E0C0">SWIFT &#183; SWIFTUI</text>
</svg>
