<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="nordic — full-stack engineer">
  <title>nordic — full-stack engineer</title>
  <defs>
    <linearGradient id="wordmark" x1="82" y1="138" x2="82" y2="207" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#B9C0CE"/>
    </linearGradient>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0H0V64" fill="none" stroke="#FFFFFF" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
    <clipPath id="panel">
      <rect x="2" y="2" width="1276" height="416" rx="24"/>
    </clipPath>
  </defs>

  <rect x="2" y="2" width="1276" height="416" rx="24" fill="#0A0A0C"/>
  <g clip-path="url(#panel)">
    <rect x="2" y="2" width="1276" height="416" fill="url(#grid)"/>
  </g>
  <rect x="2.5" y="2.5" width="1275" height="415" rx="24" fill="none" stroke="#FFFFFF" stroke-opacity="0.08"/>

  <!-- wordmark -->
  <text x="82" y="205" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="84" font-weight="800" letter-spacing="-1.7" fill="url(#wordmark)">nordic</text>

  <!-- eyebrow -->
  <text x="86" y="258" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', 'Cascadia Code', 'Segoe UI Mono', Consolas, monospace" font-size="21" font-weight="500" letter-spacing="5" fill="#8A8F98">FULL-STACK ENGINEER · THE NORDIC STANDARD</text>

  <!-- tagline -->
  <text x="86" y="300" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="500" fill="#9AA0AB">I’d rather ship one thing <tspan fill="#E8E8EC">built properly</tspan> than ten built fast.</text>
</svg>
