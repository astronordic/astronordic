<svg width="1280" height="220" viewBox="0 0 1280 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Trustly MM — PIX escrow for middlemen. TypeScript, Next.js, Express.">
  <title>Trustly MM</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1313"/>
      <stop offset="1" stop-color="#0F1A1A"/>
    </linearGradient>
    <radialGradient id="lime" cx="0" cy="0" r="1" gradientTransform="translate(120 30) scale(300)">
      <stop stop-color="#58C411" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#58C411" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="green" cx="0" cy="0" r="1" gradientTransform="translate(1190 200) scale(360)">
      <stop stop-color="#1FA85B" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#1FA85B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="name" x1="184" y1="54" x2="184" y2="92" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#B9C0CE"/>
    </linearGradient>
    <filter id="soft" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="42"/>
    </filter>
    <clipPath id="panel">
      <rect x="2" y="2" width="1276" height="216" rx="16"/>
    </clipPath>
  </defs>

  <rect x="2" y="2" width="1276" height="216" rx="16" fill="url(#bg)"/>
  <g clip-path="url(#panel)">
    <g filter="url(#soft)">
      <rect width="1280" height="220" fill="url(#lime)"/>
      <rect width="1280" height="220" fill="url(#green)"/>
    </g>
  </g>
  <rect x="2.5" y="2.5" width="1275" height="215" rx="16" fill="none" stroke="#FFFFFF" stroke-opacity="0.08"/>

  <!-- shield mark -->
  <image x="68" y="74" width="72" height="72" href="data:image/png;base64,"/>

  <!-- name -->
  <text x="184" y="90" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="700" letter-spacing="-1" fill="url(#name)">Trustly <tspan fill="#58C411">MM</tspan></text>

  <!-- description -->
  <text x="186" y="132" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="400" fill="#9AA0AB">PIX escrow for middlemen</text>

  <!-- stack -->
  <text x="186" y="168" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', 'Cascadia Code', 'Segoe UI Mono', Consolas, monospace" font-size="16" font-weight="500" letter-spacing="3" fill="#58C411">TYPESCRIPT &#183; NEXT.JS &#183; EXPRESS</text>
</svg>
