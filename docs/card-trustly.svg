<svg width="1280" height="220" viewBox="0 0 1280 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Trustly — PIX escrow for professional middlemen">
  <title>Trustly</title>
  <defs>
    <linearGradient id="name" x1="82" y1="52" x2="82" y2="92" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#B9C0CE"/>
    </linearGradient>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0H0V64" fill="none" stroke="#FFFFFF" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
    <clipPath id="panel">
      <rect x="2" y="2" width="1276" height="216" rx="16"/>
    </clipPath>
  </defs>

  <rect x="2" y="2" width="1276" height="216" rx="16" fill="#0A0A0C"/>
  <g clip-path="url(#panel)">
    <rect x="2" y="2" width="1276" height="216" fill="url(#grid)"/>
  </g>
  <rect x="2.5" y="2.5" width="1275" height="215" rx="16" fill="none" stroke="#FFFFFF" stroke-opacity="0.08"/>

  <!-- name -->
  <text x="82" y="90" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="700" letter-spacing="-1" fill="url(#name)">Trustly</text>

  <!-- description -->
  <text x="86" y="132" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="400" fill="#9AA0AB">PIX escrow for professional middlemen</text>

  <!-- stack -->
  <text x="86" y="168" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', 'Cascadia Code', 'Segoe UI Mono', Consolas, monospace" font-size="16" font-weight="500" letter-spacing="3" fill="#58C411">TYPESCRIPT · NEXT.JS · EXPRESS</text>
</svg>
